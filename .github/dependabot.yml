version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: ⬆
    cooldown:
      default-days: 7
    labels:
      - "internal"
      - "dependencies"
      - "github_actions"
    groups:
      github-actions:
        patterns:
          - "*"
  # Python dependencies, covers root dependencies for development and also ./docker-images
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: ⬆
    cooldown:
      default-days: 7
    labels:
      - "internal"
      - "dependencies"
      - "python:pip"
    groups:
      github-actions:
        patterns:
          - "*"
